services:
  - type: web
    name: waterting-api
    env: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npx rimraf dist && npx prisma generate && npx nest build && ls -la dist/
    startCommand: node dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
