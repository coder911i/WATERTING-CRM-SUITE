version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: waterting-postgres
    restart: always
    environment:
      POSTGRES_USER: waterting_user
      POSTGRES_PASSWORD: waterting_password
      POSTGRES_DB: waterting_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
